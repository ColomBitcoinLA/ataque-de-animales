<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./css/styles.css">
        <title>Animal Combat</title>
    </head>
    <body>
        
        <section id="seleccionar-mascota" class="contenedor-mascotas">

            <h1 id="tituloH1" class="tituloPrincipal">Animal Combat</h1>

            <h2 class="subtitulo">Elige tu mascota:</h2>

            <div class="tarjetas">

                <label class="tarjeta-animal">
                    <p>Neptuno</p>
                    <img src="./assets/agua.webp" alt="Acuaman"/>
                    <input type="radio" name="mascota" value="acuaman" id="acuaman"/>
                </label>
                
                <label class="tarjeta-animal">
                    <p>Tierrudo</p>
                    <img src="./assets/tierra.webp" alt="Tierrudo"/>
                    <input type="radio" name="mascota" value="capitanPlaneta" id="capitanPlaneta"/>
                </label>
                
                <label class="tarjeta-animal">
                    <p>Salamander</p>
                    <img src="./assets/fuego.webp" alt="Salamander"/>
                    <input type="radio" name="mascota" value="charmander" id="charmander"/>
                </label>
            </div>

            <button id="botonMascota">Seleccionar</button>
        </section>

        <section id="seleccionar-ataque">

            <h1 id="tituloH1" class="tituloPrincipal">Animal Combat</h1>

            <h2>Elige tu ataque:</h2>

            <p>Tu mascota <span id="mascota-jugador"></span> tiene <span id="vidas-jugador">3</span> vidas</p>
            <p>La mascota <span id="mascota-enemigo"></span> del enemigo tiene <span id="vidas-enemigo">3</span> vidas</p>

            <div>
                <button id="botonFuego">Fuego🔥</button>
                <button id="botonAgua">Agua💧</button>
                <button id="botonTierra">Tierra🌱</button>
            </div>
            
        </section>

        <section id="mensajes">
            <!--<p>Tu mascota atacó con FUEGO, la mascota del enemigo atacó con TIERRA - GANASTE 🎉</p> -->
        </section>

        <section id="reiniciar">
            <button id="botonReiniciar">Reiniciar juego</button>
        </section>

        <script src="./js/mokepon.js"></script>
    </body>
</html>
