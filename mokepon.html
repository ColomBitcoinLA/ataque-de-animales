<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./css/styles.css">
        <title>Animal Combat</title>
    </head>
    <body>
        
        <section id="seleccionar-mascota" class="contenedor-mascotas">

            <h1 id="tituloH1" class="tituloPrincipal">Animal Combat</h1>
            <h2 class="subtitulo">Elige tu mascota:</h2>

            <div class="tarjetas">

                <label class="tarjeta-animal">
                    <p>Neptuno</p>
                    <img src="./assets/agua.webp" alt="neptuno"/>
                    <input type="radio" name="mascota" value="neptuno" id="neptuno"/>
                </label>
                
                <label class="tarjeta-animal">
                    <p>Tierrudo</p>
                    <img src="./assets/tierra.webp" alt="Tierrudo"/>
                    <input type="radio" name="mascota" value="tierrudo" id="tierrudo"/>
                </label>
                
                <label class="tarjeta-animal">
                    <p>Salamander</p>
                    <img src="./assets/fuego.webp" alt="Salamander"/>
                    <input type="radio" name="mascota" value="salamander" id="salamander"/>
                </label>
            </div>

            <button id="botonMascota" class="animarBoton">Continuar</button>
        </section>

        <section id="seleccionar-ataque" class="contenedor-ataques">

            <h1 id="tituloH1" class="tituloPrincipal">Animal Combat</h1>
            <h2 class="subtitulo">Elige tu ataque:</h2>

            <div>
                <button id="botonFuego" class="botonAtaque">Fuego🔥</button>
                <button id="botonAgua" class="botonAtaque">Agua💧</button>
                <button id="botonTierra" class="botonAtaque">Tierra🌱</button>
            </div>

            <div id="mensajes" class="contenedor-mensajes">
                <p id="resultado">Mucha suerte!</p>

                <section id="reiniciar" class="contenedor-reiniciar">
                    <button id="botonReiniciar" class="reiniciarBoton">Volver a Jugar</button>
                </section>
            </div>

            <div class="contenedor-resultados">
                <div class="contenedor-jugador">
                    <span id="vidas-jugador">3</span>
                    <span id="mascota-jugador"></span>
                    <div id="ataqueDelJugador"></div>
                </div>

                <div class="contenedor-enemigo">
                    <span id="vidas-enemigo">3</span>
                    <span id="mascota-enemigo"></span>
                    <div id="ataqueDelEnemigo"></div>
                </div>
            </div>
        </section>

        <script src="./js/mokepon.js"></script>
    </body>
</html>
